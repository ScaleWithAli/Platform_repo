{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  {{- range .Values.networkPolicy.allowFrom }}
  - from:
    - podSelector:
        matchLabels:
          app: {{ . }}
  {{- end }}
  egress:
  {{- range .Values.networkPolicy.allowTo }}
  - to:
    - podSelector:
        matchLabels:
          app: {{ . }}
  {{- end }}
{{- end }}
