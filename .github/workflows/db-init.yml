name: "DB Init"
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
defaults:
  run:
    working-directory: ./Terraform
jobs:
  db_init:
    name: "DB Init"
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - name: Terraform Init
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=cloudaura/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}"
      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client-16
        
      - name: Apply null_resource
        run: |
          terraform apply -target=random_password.master_db_pass -auto-approve
          terraform apply -target=random_password.service_db_pass -auto-approve
          terraform apply -target=random_password.jwt_secret -auto-approve
          terraform apply -target=random_password.redis_pass -auto-approve
          terraform apply -target=aws_security_group.db_sg -auto-approve
          terraform apply -target=aws_db_subnet_group.main -auto-approve
          terraform apply -target=aws_elasticache_subnet_group.main -auto-approve
          terraform apply -target=aws_db_instance.main_db -auto-approve
          terraform apply -target=aws_elasticache_replication_group.main_redis -auto-approve
          terraform apply -target=aws_secretsmanager_secret.service_secrets -auto-approve
          terraform apply -target=aws_secretsmanager_secret_version.secrets_val -auto-approve
          terraform apply -target=null_resource.init_db -auto-approve
